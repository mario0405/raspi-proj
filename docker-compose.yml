version: "3.9"

services:
  bird-deterrent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bird-deterrent
    restart: unless-stopped

    # Pi camera + USB audio access.
    # Using privileged + /dev bind is the most robust option for Pi 5 camera stacks
    # because device numbering can change across boots.
    privileged: true
    devices:
      - /dev/snd:/dev/snd
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - ./models:/app/models:ro
      - ./assets:/app/assets:ro
      - ./snapshots:/app/snapshots

    environment:
      # Basel, Switzerland (Claragraben 105 area)
      TIMEZONE: Europe/Zurich
      LATITUDE: "47.5596"
      LONGITUDE: "7.5886"

      # Detection behavior
      CONFIDENCE_THRESHOLD: "0.60"
      COOLDOWN_SECONDS: "15"
      INFERENCE_INTERVAL_SECONDS: "0.35"
      NIGHT_SLEEP_SECONDS: "60"

      # Camera tuning for heat/CPU
      CAMERA_WIDTH: "640"
      CAMERA_HEIGHT: "480"

      # Model + labels + audio file paths inside container
      MODEL_PATH: /app/models/detect.tflite
      LABELS_PATH: /app/models/labelmap.txt
      SCARE_SOUND_PATH: /app/assets/scare_sound.wav
      SNAPSHOT_DIR: /app/snapshots
      SAVE_TRIGGER_SNAPSHOTS: "true"
      SNAPSHOT_JPEG_QUALITY: "85"

      # Optional: set to your USB sound card explicitly, example: plughw:1,0
      ALSA_DEVICE: ""
